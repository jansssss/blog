name: Daily Auto Post (ohyess.kr)

on:
  workflow_dispatch:
    inputs:
      count:
        description: "생성할 글 수 (1~3)"
        required: false
        default: "1"
        type: string
      dry_run:
        description: "Dry-run (Supabase 저장 안 함)"
        required: false
        default: false
        type: boolean
      content_seed_mode:
        description: "콘텐츠 주제 선정 모드"
        required: false
        default: hybrid
        type: choice
        options:
          - hybrid
          - roadmap
          - gsc

  schedule:
    # 2일 1회 KST 05:00 트리거 후 최대 3시간 랜덤 딜레이 → 실제 실행 05:00~08:00
    - cron: "0 20 */2 * *"

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Random delay (KST 05:00~08:00 사이 랜덤 실행)
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 10800))
          echo "대기 시간: ${DELAY}초 ($(( DELAY / 60 ))분)"
          sleep $DELAY

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Write .env.local
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # 운영 정책: 자동 파이프라인은 예약·수동 실행 모두 항상 draft로만 저장한다.
          # 금융(YMYL) 글은 관리자가 직접 검수하고 '공개'를 눌러야 메인에 노출된다.
          PUBLISH_MODE: draft
          POSTS_PER_RUN: ${{ inputs.count || '1' }}
          CONTENT_SEED_MODE: ${{ inputs.content_seed_mode || 'hybrid' }}
        run: |
          printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY" >> .env.local
          printf 'OPENAI_MODEL=%s\n' "$OPENAI_MODEL" >> .env.local
          printf 'TAVILY_API_KEY=%s\n' "$TAVILY_API_KEY" >> .env.local
          printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n' "$NEXT_PUBLIC_SUPABASE_URL" >> .env.local
          printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_SERVICE_ROLE_KEY" >> .env.local
          printf 'PUBLISH_MODE=%s\n' "$PUBLISH_MODE" >> .env.local
          printf 'POSTS_PER_RUN=%s\n' "$POSTS_PER_RUN" >> .env.local
          printf 'CONTENT_SEED_MODE=%s\n' "$CONTENT_SEED_MODE" >> .env.local

      - name: Run pipeline
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m scripts.main --dry-run
          else
            python -m scripts.main --count "${{ inputs.count || '1' }}"
          fi

      - name: Clean up secrets
        if: always()
        run: rm -f .env.local
